<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Orgânica Delivery | Links</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- COLOQUE O SEU SCRIPT DO GTM AQUI DENTRO DO HEAD -->
    <!-- Exemplo:
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-XXXXXXX');</script>
    -->

    <style>
        /* Variáveis de Cores (Fácil de alterar para a identidade visual do cliente) */
        :root {
            --bg-color: #0f1115; /* Fundo escuro */
            --text-color: #ffffff;
            --primary-color: #2ECC71; /* Verde Orgânico - Altere para a cor exata da logo */
            --card-overlay: rgba(0, 0, 0, 0.6); /* Escurece a imagem de fundo do card */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Cabeçalho do Perfil */
        .profile-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary-color);
            object-fit: cover;
            margin-bottom: 15px;
            /* AQUI VOCÊ COLOCA A URL DA LOGO */
            content: url('https://i.ibb.co/YBbv2Gsj/image.png'); 
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .profile-subtitle {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-top: 5px;
        }

        /* Container dos Cards */
        .links-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Estilo dos Cards */
        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-decoration: none;
            color: white;
            height: 160px;
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        }

        /* Borda customizada por card (seguindo sua referência) */
        .card-1 { border-color: var(--primary-color); }
        .card-2 { border-color: #25D366; } /* Verde WhatsApp */
        .card-3 { border-color: #EA1D2C; } /* Vermelho iFood, se houver */

        /* Imagens de fundo dos cards */
        .card-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Coloque as imagens de fundo de cada card aqui */
        .bg-1 { background-image: url('https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?q=80&w=600&auto=format&fit=crop'); }
        .bg-2 { background-image: url('https://images.unsplash.com/photo-1611262588024-d12430b98920?q=80&w=600&auto=format&fit=crop'); }
        .bg-3 { background-image: url('https://images.unsplash.com/photo-1526367790999-0150786686a2?q=80&w=600&auto=format&fit=crop'); }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }

        .card-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 5px;
            width: 80%;
        }

        .card-subtitle {
            font-size: 0.75rem;
            color: #d1d1d1;
            margin-bottom: 15px;
            max-width: 70%;
        }

        .btn-acessar {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Variações de cor dos botões */
        .btn-wpp { background-color: #25D366; color: #000; }
        .btn-ifood { background-color: #EA1D2C; }
        
    </style>
</head>
<body>

    <!-- COLOQUE O NOSCRIPT DO GTM AQUI LOGO APÓS ABRIR O BODY -->

    <div class="profile-section">
        <img src="" alt="Logo Orgânica Delivery" class="profile-img">
        <h1 class="profile-title">Orgânica Delivery</h1>
        <p class="profile-subtitle">O melhor delivery saudável da região 🍃</p>
    </div>

    <div class="links-container">
        
        <!-- CARD 1: CARDÁPIO PRÓPRIO -->
        <a href="LINK_DO_CARDAPIO_AQUI" class="card card-1" target="_blank" onclick="trackClick('clique_cardapio_proprio')">
            <div class="card-bg bg-1"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <h2 class="card-title">Faça seu Pedido</h2>
                <p class="card-subtitle">Acesse nosso cardápio digital e ganhe descontos exclusivos.</p>
                <div class="btn-acessar">Acessar &rarr;</div>
            </div>
        </a>

        <!-- CARD 2: WHATSAPP -->
        <a href="LINK_DO_WHATSAPP_AQUI" class="card card-2" target="_blank" onclick="trackClick('clique_whatsapp')">
            <div class="card-bg bg-2"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <h2 class="card-title">Fale Conosco</h2>
                <p class="card-subtitle">Dúvidas ou pedidos grandes? Chame no WhatsApp.</p>
                <div class="btn-acessar btn-wpp">Acessar &rarr;</div>
            </div>
        </a>

        <!-- CARD 3: IFOOD / OUTRO -->
        <a href="LINK_3_AQUI" class="card card-3" target="_blank" onclick="trackClick('clique_ifood')">
            <div class="card-bg bg-3"></div>
            <div class="overlay"></div>
            <div class="card-content">
                <h2 class="card-title">Estamos no iFood</h2>
                <p class="card-subtitle">Peça também pelo aplicativo do iFood.</p>
                <div class="btn-acessar btn-ifood">Acessar &rarr;</div>
            </div>
        </a>

    </div>

    <!-- Script de Rastreamento (Envia dados para o GTM) -->
    <script>
        // Função para disparar eventos para o DataLayer do GTM
        function trackClick(nomeDoEvento) {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                'event': nomeDoEvento
            });
            console.log("Evento disparado para o GTM: " + nomeDoEvento);
        }
    </script>
</body>
</html>
